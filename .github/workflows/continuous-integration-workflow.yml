name: Continous Integration Tests
on: [ push, pull_request ]
jobs:

  jenkins-agent-base-ubi8:
    name: Jenkins agent base (UBI8)
    runs-on: ubuntu-22.04
    steps:
      -
        name: Checkout ods-core repository
        uses: actions/checkout@v4.2.2
        with:
          repository: ${{ github.repository_owner }}/ods-core
          token: ${{ secrets.GH_REPO_READ_TOKEN || github.token }}
          path: ods-core
      -
        name: Build base docker image
        working-directory: ods-core/jenkins/agent-base
        run: |
          docker build --tag opendevstackorg/ods-jenkins-agent-base-ubi8:latest --file Dockerfile.ubi8 .
      -
        name: Save base image as artifact
        run: |
          docker save --output ${{ runner.temp }}/ods-jenkins-agent-base-ubi8.tar opendevstackorg/ods-jenkins-agent-base-ubi8:latest
      -
        name: Upload base image artifact
        uses: actions/upload-artifact@v4.4.3
        with:
          name: jenkins-agent-base-ubi8
          path: ${{ runner.temp }}/ods-jenkins-agent-base-ubi8.tar

  jenkins-agent-golang-ubi8:
    name: Jenkins agent Go (UBI8)
    runs-on: ubuntu-22.04
    needs: [ jenkins-agent-base-ubi8 ]
    steps:
      -
        name: Checkout repository
        uses: actions/checkout@v4.2.2
      -
        name: Download base image artifact
        uses: actions/download-artifact@v4.1.8
        with:
          name: jenkins-agent-base-ubi8
          path: ${{ runner.temp }}
      -
        name: Load base image
        run: |
          docker load --input ${{ runner.temp }}/ods-jenkins-agent-base-ubi8.tar
      -
        name: Build docker image
        working-directory: common/jenkins-agents/golang/docker
        run: |
          docker build --tag agent-go-test-ubi8 --file Dockerfile.ubi8 \
            --build-arg goDistributionUrl=https://go.dev/dl/go1.23.0.linux-amd64.tar.gz \
            --build-arg golangciVersion=v1.60.1 \
            .

  jenkins-agent-jdk-ubi8:
    name: Jenkins agent JDK (UBI8)
    runs-on: ubuntu-22.04
    needs: [ jenkins-agent-base-ubi8 ]
    steps:
      -
