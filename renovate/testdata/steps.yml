componentID: renovate-qs
steps:
  - type: provision
    provisionParams:
      verify:
        jenkinsStages: golden/jenkins-provision-stages.json

  - type: upload
    description: "Upload configmap with configuration"
    uploadParams:
      file: fixtures/configmap.yaml
      fileName: chart/templates/configmap.yaml
      render: true

  - type: build
    buildParams:
      verify:
        jenkinsStages: golden/jenkins-build-stages.json
        sonarScan: golden/sonar-scan.json
        runAttachments:
          - "sonarqube-report-{{.ProjectID}}-renovate-qs.pdf"
        openShiftResources:
          namespace: "{{.ProjectID}}-cd"
          imageStreams:
            - renovate
          cronJobs:
            - renovate-qs

  - type: provision
    description: "Provision an component to be tested"
    componentID: python-test-renovate
    provisionParams:
      quickstarter: ods-quickstarters/be-python-flask
      branch: 4.x
      verify:
        jenkinsStages: golden/jenkins-provision-stages-python.json

  - type: run
    description: "Trigger renovate-qs cron job manually"
    runParams:
      file: scripts/run-renovate-cronjob.sh

  - type: wait
    description: "Wait for renovate-qs manual job to finish"
    waitParams:
      condition: job-complete
      resource: "job/{{.ProjectID}}-renovate-qs-manual"
      namespace: "{{.ProjectID}}-cd"
      timeout: "600s"
      interval: "10s"

  - type: bitbucket
    description: "Check if a pullrequest has been created"
    bitbucketParams:
      action: "get-pullrequest"
      project: "{{.ProjectID}}"
      repository: "{{.ProjectID}}-python-test-renovate"
      pullRequestID: "1"
      verify:
        prChecks:
          state: "OPEN"
          description: "contains: To activate Renovate, merge this Pull Request"

  # ─────────────────────────────────────────────────────────────────────────────
  # Cypress E2E evidence collection steps
  # These steps provision an e2e-cypress component and run smoke / installation /
  # integration tests against the Bitbucket UI / API to capture screenshots
  # covering the following risks:
  #   - Bitbucket repository creation with configuration files
  #   - CronJob deployment in the -cd namespace
  #   - Pull Request creation by the Renovate Bot
  # ─────────────────────────────────────────────────────────────────────────────

  - description: "Provision e2e-cypress test component for Renovate evidence"
    type: provision
    componentID: renovate-cypress-test
    provisionParams:
      quickstarter: e2e-cypress
      verify:
        jenkinsStages: "../../e2e-cypress/testdata/golden/jenkins-provision-stages.json"

  - description: "Remove default test files from e2e-cypress"
    type: bitbucket
    componentID: renovate-cypress-test
    bitbucketParams:
      action: delete-files
      repository: "{{.ProjectID}}-renovate-cypress-test"
      paths:
        - "tests/acceptance/"
        - "tests/integration/"
        - "tests/installation/"
      commitMessage: "Remove default test files"

  - description: "Point Cypress pipeline to Bitbucket for Renovate tests"
    type: bitbucket
    componentID: renovate-cypress-test
    bitbucketParams:
      action: "upload-file"
      file: "fixtures/renovate-cypress/Jenkinsfile"
      repository: "{{.ProjectID}}-renovate-cypress-test"
      filename: "Jenkinsfile"
      render: true

  - description: "Add Cypress acceptance tests - Renovate PR creation verification"
    type: bitbucket
    componentID: renovate-cypress-test
    bitbucketParams:
      action: "upload-file"
      file: "fixtures/renovate-cypress/tests/acceptance/renovate-smoke.spec.cy.ts"
      repository: "{{.ProjectID}}-renovate-cypress-test"
      filename: "tests/acceptance/renovate-smoke.spec.cy.ts"
      render: true

  - description: "Add Cypress installation tests - Bitbucket repository verification"
    type: bitbucket
    componentID: renovate-cypress-test
    bitbucketParams:
      action: "upload-file"
      file: "fixtures/renovate-cypress/tests/installation/renovate-installation.spec.cy.ts"
      repository: "{{.ProjectID}}-renovate-cypress-test"
      filename: "tests/installation/renovate-installation.spec.cy.ts"
      render: true

  - description: "Add Cypress integration tests - CronJob deployment verification"
    type: bitbucket
    componentID: renovate-cypress-test
    bitbucketParams:
      action: "upload-file"
      file: "fixtures/renovate-cypress/tests/integration/renovate-integration.spec.cy.ts"
      repository: "{{.ProjectID}}-renovate-cypress-test"
      filename: "tests/integration/renovate-integration.spec.cy.ts"
      render: true

  - description: "Run Cypress tests against Bitbucket to collect Renovate evidence"
    type: build
    componentID: renovate-cypress-test
    buildParams:
      env:
        - name: BITBUCKET_URL
          value: "https://bitbucket-{{.ProjectID}}-cd.apps.us-test.ocp.aws.boehringer.com"
        - name: PROJECT_ID
          value: "{{.ProjectID}}"
      verify:
        jenkinsStages: "golden/jenkins-build-cypress.json"
        sonarScan: "golden/sonar-scan-cypress.json"
        runAttachments:
        - sonarqube-report-{{.ProjectID}}-{{.ComponentID}}.pdf
        - cypress-test-reports-pdf.zip
        testResults: 1

